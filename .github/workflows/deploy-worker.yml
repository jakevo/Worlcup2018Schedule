name: Deploy Cloudflare Worker

on:
  push:
    branches: [main, master]
    paths:
      - 'proxy/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy proxy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: proxy
        # API_SPORTS_KEY is stored as a Worker secret via the
        # Cloudflare dashboard (one-time manual step). CI only
        # pushes the code; secrets live server-side and persist
        # across deploys. If the secret ever needs rotating, do
        # it in Cloudflare directly, not from CI.
