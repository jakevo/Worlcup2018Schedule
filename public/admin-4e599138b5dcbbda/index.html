<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Waitlist admin · WC 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root {
            --bg: #0a1128;
            --surface: #131c3a;
            --surface-2: #1a2447;
            --border: rgba(255,255,255,0.1);
            --ink: #f5f6fb;
            --ink-soft: #c5c9da;
            --muted: #8a90a8;
            --accent: #e5174a;
            --accent-soft: rgba(229,23,74,0.15);
            --good: #1ac0a6;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 16px 60px;
        }
        .wrap { max-width: 720px; margin: 0 auto; }
        h1 { font-size: 22px; margin: 0 0 4px; }
        p.sub { margin: 0 0 24px; color: var(--ink-soft); font-size: 14px; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
        }
        label.field {
            display: block;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        input[type=password], input[type=text] {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--ink);
            font-size: 14px;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: var(--accent); }
        button {
            font-family: inherit;
            font-weight: 800;
            font-size: 14px;
            padding: 11px 22px;
            border-radius: 999px;
            border: 0;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            transition: background 0.15s, transform 0.05s;
        }
        button:hover { background: #ff3a66; }
        button:active { transform: translateY(1px); }
        button.ghost {
            background: transparent;
            color: var(--ink-soft);
            border: 1px solid var(--border);
        }
        button.ghost:hover { color: var(--ink); border-color: var(--ink); }
        .row { display: flex; gap: 8px; align-items: center; }
        .stat { font-size: 36px; font-weight: 900; line-height: 1; }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .toggle-row .label { font-weight: 700; }
        .toggle-row .label .hint { display: block; font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px; }
        .switch {
            position: relative;
            width: 56px;
            height: 30px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
            border: 0;
            padding: 0;
        }
        .switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            transition: transform 0.2s;
        }
        .switch.on { background: var(--good); }
        .switch.on::after { transform: translateX(26px); }
        ul.signups {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        ul.signups li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: var(--surface-2);
            border-radius: 8px;
            font-size: 13px;
        }
        ul.signups .email { font-weight: 700; word-break: break-all; }
        ul.signups .when { color: var(--muted); font-size: 11px; flex-shrink: 0; margin-left: 12px; }
        .err { color: #ff8095; font-size: 13px; margin-top: 8px; }
        .ok { color: var(--good); font-size: 13px; margin-top: 8px; }
        .center { text-align: center; }
        .state-panel { margin-top: 16px; padding: 12px 14px; background: var(--surface-2); border-radius: 10px; font-size: 12px; }
        .state-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
        .state-key { color: var(--muted); }
        .state-row code { color: var(--ink); font-family: ui-monospace, SFMono-Regular, monospace; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Waitlist admin</h1>
    <p class="sub">World Cup Hub 2026 · private</p>

    <div id="login" class="card" style="display:none">
        <label class="field" for="token">Admin token</label>
        <div class="row">
            <input id="token" type="password" autocomplete="off" placeholder="paste your token">
            <button id="login-btn">Unlock</button>
        </div>
        <p id="login-err" class="err" hidden></p>
    </div>

    <div id="app" style="display:none">
        <div class="card">
            <div class="toggle-row">
                <div class="label">
                    Show signup form on /notifications
                    <span class="hint">ON = signup form is visible. OFF = signup form is hidden.</span>
                </div>
                <button id="toggle" class="switch" aria-label="Toggle signup form visibility" aria-pressed="false"></button>
            </div>
            <p id="toggle-msg" class="ok" hidden></p>
            <div id="state-panel" class="state-panel">
                <div class="state-row">
                    <span class="state-key">KV value (admin GET)</span>
                    <code id="state-admin">…</code>
                </div>
                <div class="state-row">
                    <span class="state-key">Public /config</span>
                    <code id="state-config">…</code>
                </div>
                <p id="state-warn" class="err" hidden></p>
            </div>
        </div>

        <div class="card">
            <div class="row" style="justify-content:space-between">
                <div>
                    <div class="stat" id="count">–</div>
                    <p class="sub" style="margin:6px 0 0">total signups</p>
                </div>
                <button id="refresh" class="ghost">Refresh</button>
            </div>
            <ul class="signups" id="list"></ul>
            <p id="list-msg" class="sub" hidden></p>
        </div>

        <div class="center">
            <button id="logout" class="ghost">Sign out</button>
        </div>
    </div>
</div>

<script>
(function () {
    const STORAGE_KEY = 'wc-admin-token';
    const $ = (id) => document.getElementById(id);
    const login = $('login');
    const app = $('app');
    const tokenInput = $('token');
    const loginErr = $('login-err');
    const countEl = $('count');
    const listEl = $('list');
    const listMsg = $('list-msg');
    const toggleBtn = $('toggle');
    const toggleMsg = $('toggle-msg');
    const stateAdmin = $('state-admin');
    const stateConfig = $('state-config');
    const stateWarn = $('state-warn');

    function getToken() {
        try { return localStorage.getItem(STORAGE_KEY) || ''; } catch (e) { return ''; }
    }
    function setToken(v) {
        try { localStorage.setItem(STORAGE_KEY, v); } catch (e) {}
    }
    function clearToken() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    }

    function showLogin() {
        login.style.display = '';
        app.style.display = 'none';
        tokenInput.focus();
    }
    function showApp() {
        login.style.display = 'none';
        app.style.display = '';
    }

    async function fetchWaitlist() {
        const token = getToken();
        if (!token) return showLogin();
        listMsg.hidden = true;
        try {
            const res = await fetch('/waitlist?token=' + encodeURIComponent(token));
            if (res.status === 405 || res.status === 401) {
                clearToken();
                loginErr.textContent = 'Token rejected. Try again.';
                loginErr.hidden = false;
                return showLogin();
            }
            const data = await res.json();
            countEl.textContent = String(data.count || 0);
            listEl.innerHTML = '';
            const items = (data.items || []).slice().reverse();
            for (const it of items.slice(0, 50)) {
                const li = document.createElement('li');
                const e = document.createElement('span');
                e.className = 'email';
                e.textContent = it.email;
                const w = document.createElement('span');
                w.className = 'when';
                w.textContent = it.signedUpAt ? new Date(it.signedUpAt).toLocaleString() : '';
                li.appendChild(e);
                li.appendChild(w);
                listEl.appendChild(li);
            }
            if (!items.length) {
                listMsg.textContent = 'No signups yet.';
                listMsg.hidden = false;
            }
        } catch (err) {
            listMsg.textContent = 'Network error: ' + err;
            listMsg.hidden = false;
        }
    }

    async function fetchToggle() {
        const token = getToken();
        if (!token) return;
        let adminVal = null, configVal = null;
        try {
            const res = await fetch('/admin/waitlist-toggle?token=' + encodeURIComponent(token), { cache: 'no-store' });
            const data = await res.json().catch(() => ({}));
            if (res.ok && typeof data.signupOpen === 'boolean') {
                adminVal = data.signupOpen;
                setSwitch(adminVal);
                stateAdmin.textContent = String(adminVal);
            } else {
                stateAdmin.textContent = `error ${res.status}: ${data.error || 'unknown'}`;
            }
        } catch (err) {
            stateAdmin.textContent = 'fetch failed: ' + err.message;
        }
        try {
            const res = await fetch('/config?_=' + Date.now(), { cache: 'no-store' });
            const data = await res.json().catch(() => ({}));
            configVal = !!data.signupOpen;
            stateConfig.textContent = String(configVal);
        } catch (err) {
            stateConfig.textContent = 'fetch failed: ' + err.message;
        }
        if (adminVal !== null && configVal !== null && adminVal !== configVal) {
            stateWarn.textContent = `Mismatch: KV says ${adminVal}, /config says ${configVal}. /config has up to 60s of edge KV cache — wait a minute and refresh.`;
            stateWarn.hidden = false;
        } else {
            stateWarn.hidden = true;
        }
    }

    function setSwitch(on) {
        toggleBtn.classList.toggle('on', !!on);
        toggleBtn.setAttribute('aria-pressed', on ? 'true' : 'false');
        toggleBtn.dataset.state = on ? 'on' : 'off';
    }

    async function flipToggle() {
        const token = getToken();
        if (!token) return showLogin();
        const current = toggleBtn.dataset.state === 'on';
        const next = !current;
        toggleMsg.hidden = true;
        toggleMsg.className = 'ok';
        try {
            const res = await fetch('/admin/waitlist-toggle?token=' + encodeURIComponent(token), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ open: next }),
                cache: 'no-store'
            });
            if (res.status === 401) {
                clearToken();
                return showLogin();
            }
            const data = await res.json().catch(() => ({}));
            if (!res.ok || typeof data.signupOpen !== 'boolean') {
                toggleMsg.className = 'err';
                toggleMsg.textContent = `Toggle failed (HTTP ${res.status}): ${data.error || 'no signupOpen in response'}`;
                toggleMsg.hidden = false;
                fetchToggle();
                return;
            }
            setSwitch(data.signupOpen);
            toggleMsg.textContent = data.signupOpen
                ? 'Signup form is ON — visible on /notifications. (~60s for cache to refresh.)'
                : 'Signup form is OFF — hidden on /notifications.';
            toggleMsg.hidden = false;
            fetchToggle();
        } catch (err) {
            toggleMsg.className = 'err';
            toggleMsg.textContent = 'Toggle failed: ' + err;
            toggleMsg.hidden = false;
        }
    }

    $('login-btn').addEventListener('click', () => {
        const v = tokenInput.value.trim();
        if (!v) return;
        setToken(v);
        loginErr.hidden = true;
        showApp();
        fetchWaitlist();
        fetchToggle();
    });
    tokenInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') $('login-btn').click();
    });
    $('refresh').addEventListener('click', () => {
        fetchWaitlist();
        fetchToggle();
    });
    $('logout').addEventListener('click', () => {
        clearToken();
        showLogin();
    });
    toggleBtn.addEventListener('click', flipToggle);

    if (getToken()) {
        showApp();
        fetchWaitlist();
        fetchToggle();
    } else {
        showLogin();
    }
})();
</script>
</body>
</html>
