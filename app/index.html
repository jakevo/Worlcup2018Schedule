<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>World Cup 2026 Schedule</title>
    <meta name="description" content="Groups, schedule, knockout bracket and live scores for the 2026 FIFA World Cup in Canada, Mexico and the USA.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a1128">

    <!-- Icons & PWA -->
    <link rel="icon" type="image/svg+xml" href="{{rootURL}}favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="{{rootURL}}apple-touch-icon.svg">
    <link rel="manifest" href="{{rootURL}}manifest.webmanifest">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="WC 2026">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="World Cup 2026">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="World Cup 2026">
    <meta property="og:title" content="FIFA World Cup 2026">
    <meta property="og:description" content="48 nations. 16 host cities. Follow every group, every kickoff and every goal across Canada, Mexico and the United States.">
    <meta property="og:locale" content="en_US">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FIFA World Cup 2026">
    <meta name="twitter:description" content="48 nations. 16 host cities. Follow every group, every kickoff and every goal across Canada, Mexico and the United States.">

    {{content-for "head"}}

    <!-- Fonts & remote assets: preconnect early to trim TTFB -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://flagcdn.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
      (function () {
        try {
          var saved = localStorage.getItem('wc-theme');
          var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) { /* localStorage blocked */ }
      })();
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SportsEvent",
      "name": "FIFA World Cup 2026",
      "description": "The 23rd FIFA World Cup, held across 16 host cities in Canada, Mexico and the United States.",
      "startDate": "2026-06-11",
      "endDate": "2026-07-19",
      "eventStatus": "https://schema.org/EventScheduled",
      "eventAttendanceMode": "https://schema.org/MixedEventAttendanceMode",
      "sport": "Association football",
      "organizer": {
        "@type": "SportsOrganization",
        "name": "FIFA",
        "url": "https://www.fifa.com/"
      },
      "location": [
        { "@type": "Country", "name": "Canada" },
        { "@type": "Country", "name": "Mexico" },
        { "@type": "Country", "name": "United States" }
      ]
    }
    </script>

    <link integrity="" rel="stylesheet" href="{{rootURL}}assets/vendor.css">
    <link integrity="" rel="stylesheet" href="{{rootURL}}assets/world-cup2026-schedule.css">

    {{content-for "head-footer"}}
  </head>
  <body>
    {{content-for "body"}}

    <script src="{{rootURL}}assets/vendor.js"></script>
    <script src="{{rootURL}}assets/world-cup2026-schedule.js"></script>

    {{content-for "body-footer"}}
  </body>
</html>
